<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Ulubione gry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>❤️ Moje ulubione gry</h2>

        <a href="/games" class="btn btn-secondary">
            ← Powrót do katalogu
        </a>
    </div>

    <div th:if="${games.isEmpty()}">
        <div class="alert alert-info">
            Nie masz jeszcze ulubionych gier.
        </div>
    </div>

    <div class="row">

        <div class="col-md-4 mb-4" th:each="g : ${games}">

            <div class="card h-100 shadow-sm">

                <img th:src="${g.imageUrl}"
                     class="card-img-top"
                     style="height: 220px; object-fit: cover;">

                <div class="card-body">

                    <h5 th:text="${g.title}"></h5>

                    <p>
                        <b>Gatunek:</b>
                        <span th:text="${g.genre}"></span>
                    </p>

                    <p>
                        <b>Platforma:</b>
                        <span th:text="${g.platform}"></span>
                    </p>

                    <a th:href="@{'/game/' + ${g.id}}"
                       class="btn btn-primary">
                        Szczegóły
                    </a>

                    <a th:href="@{'/favorite/delete/' + ${g.id}}"
                       class="btn btn-danger">
                        Usuń
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
