<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dodaj grę</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">➕ Dodaj grę</h2>

        <form method="post" action="/admin/add-game">

            <input type="text"
                   name="title"
                   class="form-control mb-3"
                   placeholder="Tytuł gry"
                   required>

            <input type="text"
                   name="genre"
                   class="form-control mb-3"
                   placeholder="Gatunek"
                   required>

            <input type="text"
                   name="platform"
                   class="form-control mb-3"
                   placeholder="Platforma"
                   required>

            <input type="number"
                   step="0.1"
                   min="0"
                   max="10"
                   name="rating"
                   class="form-control mb-3"
                   placeholder="Ocena np. 8.5"
                   required>

            <textarea name="description"
                      class="form-control mb-3"
                      rows="4"
                      placeholder="Opis gry"></textarea>

            <input type="text"
                   name="imageUrl"
                   class="form-control mb-3"
                   placeholder="URL obrazka">

            <button class="btn btn-success">
                Dodaj grę
            </button>

            <a href="/admin/games" class="btn btn-secondary">
                Powrót
            </a>

        </form>

    </div>

</div>

</body>
</html>
