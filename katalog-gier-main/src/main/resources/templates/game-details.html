<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Szczegóły gry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <a href="/games" class="btn btn-secondary mb-4">
        ← Powrót do katalogu
    </a>

    <div class="card shadow p-4">

        <div class="row">

            <div class="col-md-5">
                <img th:src="${game.imageUrl}"
                     class="img-fluid rounded"
                     style="max-height: 400px; object-fit: cover;">
            </div>

            <div class="col-md-7">

                <h2 th:text="${game.title}"></h2>

                <p>
                    <b>Gatunek:</b>
                    <span th:text="${game.genre}"></span>
                </p>

                <p>
                    <b>Platforma:</b>
                    <span th:text="${game.platform}"></span>
                </p>

                <p>
                    <b>Ocena:</b>
                    <span th:text="${game.rating}"></span>/10
                </p>

                <hr>

                <p th:text="${game.description}"></p>

                <a th:href="@{'/favorite/add/' + ${game.id}}"
                   class="btn btn-danger mt-3">
                    ❤️ Dodaj do ulubionych
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
